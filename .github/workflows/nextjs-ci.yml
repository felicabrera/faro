name: Next.js CI

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'web/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [develop, main]
    paths:
      - 'web/**'

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: npm audit (vulnerabilidades de dependencias)
        run: npm audit --audit-level=high
